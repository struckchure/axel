id = "axel"
name = "Axel"
version = "0.0.1"
schema_version = 1
authors = ["Mohammed Al-Ameen"]
description = "Syntax highlighting for Axel Schema (.asl) and Query (.aql) languages."
repository = "https://github.com/struckchure/axel"

# Grammars live in subdirectories of this repository and are referenced via
# `path`. `rev` MUST point at a commit that contains tools/zed/grammars — update
# it to the commit that adds this extension (see tools/zed/README.md for the
# local `file://` development workflow).
[grammars.asl]
repository = "https://github.com/struckchure/axel"
path = "tools/zed/grammars/asl"
rev = "main"

[grammars.aql]
repository = "https://github.com/struckchure/axel"
path = "tools/zed/grammars/aql"
rev = "main"
