id = "axel"
name = "Axel"
version = "0.0.2"
schema_version = 1
authors = ["Mohammed Al-Ameen"]
description = "Syntax highlighting for Axel Schema (.asl) and Query (.aql) languages."
repository = "https://github.com/struckchure/axel"

# Grammar sources live at tools/zed/parsers/<name> (NOT under grammars/, which
# Zed clones into and manages itself). `rev` must point at a commit that contains
# those sources — see tools/zed/README.md for the local `file://` dev workflow.
[grammars.asl]
repository = "https://github.com/struckchure/axel"
path = "tools/zed/parsers/asl"
rev = "5891384cb11cc8ae0da0c0346621d7c219416673"

[grammars.aql]
repository = "https://github.com/struckchure/axel"
path = "tools/zed/parsers/aql"
rev = "5891384cb11cc8ae0da0c0346621d7c219416673"
