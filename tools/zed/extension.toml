id = "axel"
name = "Axel"
version = "0.0.7"
schema_version = 1
authors = ["Mohammed Al-Ameen"]
description = "Syntax highlighting and language server for Axel Schema (.asl) and Query (.aql)."
repository = "https://github.com/struckchure/axel"

# Language server — launches the system-installed `axel` CLI as `axel lsp`.
# See src/lib.rs. Requires the `axel` binary on PATH (or lsp.axel.binary.path).
[language_servers.axel]
name = "Axel"
languages = ["Axel Schema", "Axel Query"]

# Grammar sources live at tools/zed/parsers/<name> (NOT under grammars/, which
# Zed clones into and manages itself). `rev` must point at a commit that contains
# those sources — see tools/zed/README.md for the local `file://` dev workflow.
[grammars.asl]
repository = "https://github.com/struckchure/axel"
path = "tools/zed/parsers/asl"
rev = "2d6d5c40a465e0d62a9f48644818fd68e013fb9c"

[grammars.aql]
repository = "https://github.com/struckchure/axel"
path = "tools/zed/parsers/aql"
rev = "2d6d5c40a465e0d62a9f48644818fd68e013fb9c"
