name: Build and Release

on:
  push:
    # Tag pushes always run and publish a release. Path filters are ignored for
    # tag pushes, so a tag on a docs/branding commit still releases.
    tags:
      - v*
    # Branch pushes only build (no release) and only when Go sources or the build
    # config change — docs/branding/tooling changes don't trigger a binary build.
    branches:
      - main
    paths:
      - "**/*.go"
      - go.mod
      - go.sum
      - .goreleaser.yaml
      - .github/workflows/build-and-release.yaml

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Release (tag push)
        if: github.ref_type == 'tag'
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build check (branch push)
        if: github.ref_type != 'tag'
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: build --snapshot --clean
